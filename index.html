<!DOCTYPE html>
<html lang="tr" dir="ltr" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Wow Mobilya – Çok yakında yeni platformumuzla karşınızdayız." />
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Wow Mobilya – Çok Yakında</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }

    :root {
      --text:    #0f172a;
      --text2:   #64748b;
      --text3:   #94a3b8;
      --line:    #e2e8f0;
      --accent:  #2563eb;
      --bg:      #ffffff;
      --bg2:     #f8fafc;
      --font:    'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 40px 24px;
    }

    /* ── Top line ── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #60a5fa, #2563eb);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Wrapper ── */
    .wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 52px;
    }

    .logo img {
      height: 52px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--text);
      margin-bottom: 16px;
    }

    h1 span {
      color: var(--accent);
    }

    p.sub {
      font-size: 16px;
      font-weight: 400;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 52px;
      max-width: 380px;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 32px;
      margin-bottom: 52px;
    }

    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .cd-num {
      font-size: clamp(40px, 10vw, 64px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .cd-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .cd-sep {
      font-size: 48px;
      font-weight: 300;
      color: var(--line);
      line-height: 1;
      padding-top: 4px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-bottom: 40px;
    }

    /* ── Notify ── */
    .notify-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 14px;
    }

    .notify-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .notify-input {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      background: var(--bg2);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .notify-input::placeholder { color: var(--text3); }

    .notify-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }

    .notify-btn {
      height: 48px;
      padding: 0 22px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .15s;
    }

    .notify-btn:hover   { background: #1d4ed8; transform: translateY(-1px); }
    .notify-btn:active  { transform: translateY(0); }

    .notify-ok {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      width: 100%;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #16a34a;
    }

    .notify-ok svg {
      width: 16px; height: 16px;
      stroke: #16a34a; fill: none;
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── Social ── */
    .social {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 32px;
    }

    .s-btn {
      width: 42px; height: 42px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      text-decoration: none;
      transition: all .2s;
    }

    .s-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #eff6ff;
    }

    .s-btn svg {
      width: 17px; height: 17px;
      stroke: currentColor; fill: none;
      stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: var(--text3);
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .countdown { gap: 18px; }
      .cd-sep    { font-size: 36px; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <!-- Logo -->
    <div class="logo">
      <img
        src="https://static.wixstatic.com/media/42e4ec_f5a158ae0de84175b56c9be6c7cefc81~mv2.png/v1/fill/w_472,h_186,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/%D9%86%D8%B3%D8%AE%D8%A9%20%D9%85%D9%86%20%D8%A5%D8%B6%D8%A7%D9%81%D8%A9%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(1)%20(1)_edited.png"
        alt="Wow Mobilya"
      />
    </div>

    <!-- Badge -->
    <div class="badge">
      <div class="badge-dot"></div>
      Yapım Aşamasında
    </div>

    <!-- Headline -->
    <h1>Çok <span>Yakında</span><br>Buradayız</h1>
    <p class="sub">
      Sizler için yepyeni bir deneyim hazırlıyoruz.<br>
      Yeni sitemiz çok yakında yayında olacak.
    </p>

    <!-- Countdown -->
    <div class="countdown">
      <div class="cd-item">
        <div class="cd-num" id="cd-days">00</div>
        <div class="cd-label">Gün</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-item">
        <div class="cd-num" id="cd-hours">00</div>
        <div class="cd-label">Saat</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-item">
        <div class="cd-num" id="cd-mins">00</div>
        <div class="cd-label">Dakika</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-item">
        <div class="cd-num" id="cd-secs">00</div>
        <div class="cd-label">Saniye</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Notify -->
    <div class="notify-label">Yayına girdiğimizde sizi haberdar edelim</div>
    <div class="notify-row" id="notifyForm">
      <input
        class="notify-input"
        type="email"
        id="emailInput"
        placeholder="E-posta adresiniz"
      />
      <button class="notify-btn" onclick="handleNotify()">Bildir</button>
    </div>
    <div class="notify-ok" id="notifyOk">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Harika! Sizi bilgilendireceğiz.
    </div>

    <!-- Social -->
    <div class="social">
      <a href="#" class="s-btn" title="Instagram">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
      </a>
      <a href="#" class="s-btn" title="Facebook">
        <svg viewBox="0 0 24 24">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
      <a href="#" class="s-btn" title="WhatsApp">
        <svg viewBox="0 0 24 24">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </a>
      <a href="#" class="s-btn" title="E-posta">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </a>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">© 2026 Wow Mobilya. Tüm hakları saklıdır.</div>

  <script>
    // ── Countdown ──
    const LAUNCH = new Date('2026-09-01T00:00:00');

    function tick() {
      const diff = LAUNCH - Date.now();
      if (diff <= 0) return;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);
      const p = n => String(n).padStart(2, '0');
      document.getElementById('cd-days').textContent  = p(d);
      document.getElementById('cd-hours').textContent = p(h);
      document.getElementById('cd-mins').textContent  = p(m);
      document.getElementById('cd-secs').textContent  = p(s);
    }
    tick();
    setInterval(tick, 1000);

    // ── Notify ──
    function handleNotify() {
      const v = document.getElementById('emailInput').value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
        const el = document.getElementById('emailInput');
        el.style.borderColor = '#ef4444';
        el.style.boxShadow   = '0 0 0 3px rgba(239,68,68,.1)';
        el.focus();
        setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1800);
        return;
      }
      document.getElementById('notifyForm').style.display = 'none';
      document.getElementById('notifyOk').style.display   = 'flex';
    }

    document.getElementById('emailInput')
      .addEventListener('keydown', e => { if (e.key === 'Enter') handleNotify(); });
  </script>
</body>
</html>
